<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit</title>
    <link rel="stylesheet" href="css/global.css" />
    <script
      src="https://kit.fontawesome.com/4b71fec88a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header></header>
    <main class="edit-main">
      <form id="edit-form" novalidate>
        <fieldset>
          <legend>Upload image</legend>
          <label for="img-url" class="visually-hidden">Image url</label>
          <input
            type="text"
            name="img-url"
            id="img-url"
            placeholder="input url"
          />
          <div class="error"></div>
          <label for="img-url" class="visually-hidden">Image alt text</label>
          <input
            type="text"
            id="img-alt"
            name="img-alt"
            placeholder="input alt-text"
          />
          <div class="error"></div>
        </fieldset>
        <label for="title">Title</label>
        <input type="text" name="title" id="title" required />
        <div class="error"></div>
        <label for="caption">Caption</label>
        <input type="text" name="caption" id="caption" required />
        <div class="error"></div>
        <div class="button-div">
          <button id="submit-btn" type="submit" class="primary-button">
            Upload
          </button>
          <button id="delete-btn" type="button">
            <i class="fa-regular fa-trash-can"></i>
            <span>Delete post</span>
          </button>
        </div>
      </form>
    </main>
    <footer></footer>
    <script type="module" src="js/pages/edit-post.js"></script>
  </body>
</html>
